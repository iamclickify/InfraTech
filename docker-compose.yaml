
services:
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: infratech
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 20

  django:
    build: .
    volumes:
      - .:/app
      - django_static:/app/staticfiles
      - azure_config:/root/.azure
    command: sh -c "python wait_for_db.py && python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  metric-scheduler:
    build: .
    volumes:
      - .:/app
    command: sh -c "python wait_for_db.py && while true; do python manage.py collect_metrics; sleep 60; done"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/var/www/html/static:ro
    depends_on:
      - django

volumes:
  mysql_data:
  django_static:
  azure_config: